
<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>محفظتي الاكترونية</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#020617" id="meta-theme-color" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="محفظتي">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="محفظتي">
    <meta name="msapplication-TileColor" content="#020617">
    <meta name="msapplication-tap-highlight" content="no">
    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials">
    <link rel="apple-touch-icon" href="https://vgosloxhrahixrduuzkt.supabase.co/storage/v1/object/public/assets/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --sat: env(safe-area-inset-top);
            --sar: env(safe-area-inset-right);
            --sab: env(safe-area-inset-bottom);
            --sal: env(safe-area-inset-left);
        }

        /* متغيرات الألوان للوضع الليلي والنهاري */
        :root.dark {
            --bg-color: #020617;
            --text-color: #f8fafc;
            --card-bg: linear-gradient(145deg, rgba(30, 41, 59, 0.6) 0%, rgba(15, 23, 42, 0.8) 100%);
            --border-color: rgba(255, 255, 255, 0.05);
            --scrollbar-thumb: #334155;
        }

        :root.light {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --card-bg: linear-gradient(145deg, rgba(255, 255, 255, 0.8) 0%, rgba(241, 245, 249, 0.9) 100%);
            --border-color: rgba(0, 0, 0, 0.05);
            --scrollbar-thumb: #cbd5e1;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        body {
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.5s ease, color 0.5s ease;
            background-image: 
                radial-gradient(at 0% 0%, rgba(6, 182, 212, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.05) 0px, transparent 50%);
            background-attachment: fixed;
        }

        .glass-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
        }

        .pb-safe { padding-bottom: var(--sab); }
        .pt-safe { padding-top: var(--sat); }

        @media print {
            .print-hidden { display: none !important; }
            .print-only { display: block !important; visibility: visible !important; }
            body { background: white !important; color: black !important; }
            @page { size: A4; margin: 1cm; }
        }
        
        .print-only { display: none; }

        button:active { transform: scale(0.96); transition: transform 0.1s; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .animate-shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
    </style>
    <script>
        tailwind.config = {
          darkMode: 'class',
          theme: {
            extend: {
              fontFamily: { sans: ['Cairo', 'sans-serif'] },
              colors: { 
                slate: { 
                    850: '#172033', 
                    900: '#0f172a', 
                    950: '#020617' 
                } 
              },
              animation: { 
                'fade-in': 'fadeIn 0.3s ease-out forwards', 
                'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards' 
              },
              keyframes: { 
                  fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } }, 
                  slideUp: { '0%': { transform: 'translateY(20px)', opacity: 0 }, '100%': { transform: 'translateY(0)', opacity: 1 } }
              }
            }
          }
        }
    </script>
