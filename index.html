<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>محفظتي الاكترونية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .masonry-grid {
            column-gap: 1rem; /* gap between columns */
        }
        @media (min-width: 640px) { .masonry-grid { column-count: 2; } }
        @media (min-width: 768px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 4; } }

        .masonry-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 1rem; /* gap between rows */
            break-inside: avoid;
        }
        
        /* Stop Firefox from adding a scrollbar to contentEditable */
        [contenteditable] {
          scrollbar-width: none;
        }
        [contenteditable]::-webkit-scrollbar {
          display: none;
        }

    </style>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              fontFamily: {
                sans: ['Cairo', 'sans-serif'],
              },
              animation: {
                'fade-in': 'fadeIn 0.2s ease-out forwards',
                'fade-in-fast': 'fadeIn 0.1s ease-out forwards',
                'slide-up': 'slideUp 0.2s ease-out forwards',
              },
              keyframes: {
                fadeIn: {
                  '0%': { opacity: 0 },
                  '100%': { opacity: 1 },
                },
                slideUp: {
                    '0%': { transform: 'translateY(20px)', opacity: 0 },
                    '100%': { transform: 'translateY(0)', opacity: 1 },
                }
              }
            }
          }
        }
    </script>
