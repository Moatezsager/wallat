<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>محفظتي الاكترونية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .masonry-grid {
            column-count: 2;
            column-gap: 0.75rem; /* 12px gap for mobile */
        }
        .masonry-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 0.75rem; /* 12px gap for mobile */
            break-inside: avoid;
        }
        @media (min-width: 640px) {
            .masonry-grid { column-gap: 1rem; }
            .masonry-item { margin-bottom: 1rem; }
        }
        @media (min-width: 768px) { .masonry-grid { column-count: 3; } }
        @media (min-width: 1024px) { .masonry-grid { column-count: 4; } }

        /* Stop Firefox from adding a scrollbar to contentEditable */
        [contenteditable] {
          scrollbar-width: none;
        }
        [contenteditable]::-webkit-scrollbar {
          display: none;
        }
        
        /* Placeholder for contentEditable */
        [contenteditable]:empty:before {
            content: attr(data-placeholder);
            color: #94a3b8; /* slate-400 */
            cursor: text;
            pointer-events: none; /* Allow clicking through placeholder */
        }
        
        /* Fade out long note cards */
        .note-card-content {
            max-height: 70px; /* More compact height for mobile */
            overflow: hidden;
            position: relative;
            -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
        }
        
        @media (min-width: 640px) {
            .note-card-content {
                max-height: 120px; /* Taller for larger screens */
                -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
                mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
            }
        }

        /* Styles for rich text content inside notes */
        .prose { color: #d1d5db; }
        .prose h1, .prose h2, .prose h3, .prose h4, .prose h5, .prose h6 { color: #fff; margin-bottom: 0.5em; }
        .prose a { color: #67e8f9; }
        .prose strong { color: #fff; }
        .prose blockquote {
            border-right: 0.25em solid #52525b;
            padding-right: 1em;
            margin-right: 0;
            color: #a1a1aa;
        }
        .prose ul, .prose ol { padding-right: 1.5em; }
        .prose p { margin: 0.5em 0; }
        
        /* Compact prose styles for note cards for better consistency */
        .note-card-content .prose p,
        .note-card-content .prose ul,
        .note-card-content .prose ol {
            margin-top: 0.25rem;
            margin-bottom: 0.25rem;
        }
        .note-card-content .prose h1,
        .note-card-content .prose h2,
        .note-card-content .prose h3,
        .note-card-content .prose h4,
        .note-card-content .prose h5,
        .note-card-content .prose h6 {
            margin-bottom: 0.25rem;
        }
        .note-card-content .prose li {
            margin: 0.1rem 0;
        }

        /* Styles for the new note action menu */
        .note-action-menu button, .note-action-menu .color-picker-container {
            width: 100%;
            text-align: right;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }
        .note-action-menu button {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-radius: 0.375rem; /* 6px */
            transition: background-color 0.2s;
        }
        .note-action-menu button:hover {
            background-color: #334155; /* slate-700 */
        }
        .note-action-menu button.delete-btn {
            color: #f87171; /* red-400 */
        }
        .note-action-menu button.delete-btn:hover {
            background-color: rgba(248, 113, 113, 0.1);
        }

    </style>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              fontFamily: {
                sans: ['Cairo', 'sans-serif'],
              },
              animation: {
                'fade-in': 'fadeIn 0.2s ease-out forwards',
                'fade-in-fast': 'fadeIn 0.1s ease-out forwards',
                'slide-up': 'slideUp 0.2s ease-out forwards',
              },
              keyframes: {
                fadeIn: {
                  '0%': { opacity: 0 },
                  '100%': { opacity: 1 },
                },
                slideUp: {
                    '0%': { transform: 'translateY(20px)', opacity: 0 },
                    '100%': { transform: 'translateY(0)', opacity: 1 },
                }
              }
            }
          }
        }
    </script>
